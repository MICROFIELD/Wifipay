<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wifipay Admin Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --bg: #0a0a14; --surface: #12121e; --surface2: #1a1a2e;
        --primary: #7c6aff; --secondary: #a78bfa; --text: #f0f0ff;
        --text-sub: rgba(240,240,255,0.45); --border: rgba(255,255,255,0.07);
        --green: #22d3a5; --red: #ff6b6b; --gold: #f7c948;
        --radius: 22px; --font: 'DM Sans', sans-serif; --mono: 'Space Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }
    body { background: var(--bg); color: var(--text); padding-bottom: 90px; }

    .header { background: linear-gradient(135deg, var(--bg), var(--surface2)); padding: 30px 20px 70px; border-bottom: 1px solid var(--border); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
    .header-title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 12px; }

    .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; margin-top: -40px; }
    .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .dash-lbl { font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
    .dash-val { font-size: 18px; font-weight: 700; font-family: var(--mono); margin-top: 5px; }

    .tab-content { display: none; animation: slideUp 0.4s ease; padding: 15px; }
    .tab-content.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .sec-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

    .form-control { width: 100%; padding: 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; font-size: 14px; color: #fff; outline: none; margin-bottom: 12px; }
    
    .btn { padding: 14px; border: none; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-green { background: var(--green); color: white; width: 100%; }
    .btn-danger { background: rgba(255,107,107,0.1); color: var(--red); border: 1px solid var(--red); }
    .btn-outline { background: var(--surface2); border: 1px solid var(--border); color: #fff; }
    .btn-sm { padding: 8px 12px; font-size: 11px; width: auto; }

    .cus-info-box { background: rgba(34,211,165,0.05); border: 1px dashed var(--green); border-radius: 16px; padding: 18px; display: none; margin-bottom: 15px; }
    
    .stock-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .stock-item { background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 14px; font-size: 12px; display: flex; justify-content: space-between; }
    .stock-item b { color: var(--gold); }

    .item-card { background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

    .order-card { background: var(--surface2); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; margin-bottom: 12px; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .st-pending { background: rgba(247,201,72,0.1); color: var(--gold); }
    .st-accepted { background: rgba(124,106,255,0.1); color: var(--primary); }

    .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid var(--border); z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); flex: 1; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .nav-item span { font-size: 9px; font-weight: 700; margin-top: 4px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: var(--surface); border-radius: 25px; padding: 25px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; position: relative; }

    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--primary); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
</style>
</head>
<body onclick="document.getElementById('orderRing').load()">

<audio id="orderRing" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div class="header">
    <div style="max-width:500px; margin:0 auto;"><div class="header-title"><i class="fa-solid fa-crown"></i> Wifipay Admin Pro</div></div>
</div>

<div style="max-width:500px; margin:0 auto;">
    
    <div id="tab-home" class="tab-content active">
        <div class="dash-grid">
            <div class="dash-card"><div class="dash-lbl" style="color:var(--primary);">Users</div><div class="dash-val" id="statUsers">0</div></div>
            <div class="dash-card"><div class="dash-lbl" style="color:var(--gold);">WiFi Stock</div><div class="dash-val" id="statVoucher">0</div></div>
            <div class="dash-card"><div class="dash-lbl" style="color:var(--green);">Cash In</div><div class="dash-val" id="statTopup">0</div></div>
            <div class="dash-card"><div class="dash-lbl" style="color:var(--red);">Food Sales</div><div class="dash-val" id="statFood">0</div></div>
        </div>

        <div class="section" style="margin-top:20px;">
            <div class="sec-title"><i class="fa-solid fa-warehouse"></i> ၁။ ဂိုဒေါင် စီမံခန့်ခွဲမှု</div>
            <div id="stockSummary" class="stock-grid"></div>
            <textarea id="newCodes" class="form-control" style="height:100px;" placeholder="Ruijie မှ Code များကို ကူးထည့်ပါ..."></textarea>
            <button class="btn btn-primary" onclick="window.addStock()"><i class="fa-solid fa-plus"></i> ဂိုဒေါင်ထဲ ထည့်မည်</button>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn btn-outline btn-sm" style="flex:1;" onclick="window.openModal('logModal')">📋 မှတ်တမ်း</button>
                <button class="btn btn-outline btn-sm" style="flex:1;" onclick="window.openManageStock()">📦 Code များပြင်ရန်</button>
            </div>
        </div>

        <div class="section">
            <div class="sec-title"><i class="fa-solid fa-wallet"></i> ၂။ ငွေဖြည့်/နုတ် စနစ်</div>
            <div style="display:flex; gap:8px;">
                <input type="tel" id="topupPhone" class="form-control" placeholder="ဖုန်းနံပါတ် (သို့) အမည်" list="pList" style="margin-bottom:0;">
                <button class="btn btn-outline" style="width:55px;" onclick="window.checkCus()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <datalist id="pList"></datalist>
            
            <div id="cusInfoBox" class="cus-info-box" style="margin-top:15px;">
                <p>အမည်: <b id="infoName" style="color:#fff;">-</b></p>
                <p>လက်ကျန်ငွေ: <b id="infoBal" style="color:var(--green); font-size:18px;">0</b> Ks</p>
                <input type="number" id="topupAmt" class="form-control" style="margin-top:10px;" placeholder="ပမာဏ (Ks)">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-green" style="flex:2;" onclick="window.doTopup('in')">ငွေဖြည့်မည်</button>
                    <button class="btn btn-danger btn-sm" style="flex:1;" onclick="window.doTopup('out')">နုတ်မည်</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-users" class="tab-content">
        <div class="section">
            <div class="sec-title"><i class="fa-solid fa-users"></i> ဖောက်သည် စာရင်းအားလုံး</div>
            <div id="userList"></div>
        </div>
    </div>

    <div id="tab-orders" class="tab-content">
        <div class="section">
            <div class="sec-title" style="color:var(--gold);"><i class="fa-solid fa-bell-concierge"></i> အစားအသောက် အော်ဒါများ</div>
            <div id="orderList"></div>
        </div>
    </div>

    <div id="tab-food" class="tab-content">
        <div class="section">
            <div class="sec-title"><i class="fa-solid fa-utensils"></i> ဟင်းပွဲ Menu စီမံရန်</div>
            <div style="display:grid; grid-template-columns: 1fr 2fr 1fr; gap:8px; margin-bottom:10px;">
                <input type="text" id="foodIcon" class="form-control" placeholder="Icon 🍲" style="margin-bottom:0;">
                <input type="text" id="foodName" class="form-control" placeholder="အမည်" style="margin-bottom:0;">
                <input type="number" id="foodPrice" class="form-control" placeholder="စျေး" style="margin-bottom:0;">
            </div>
            <button class="btn btn-primary btn-sm" style="width:100%;" onclick="window.saveMenu('food')">+ ဟင်းပွဲအသစ် ထည့်မည်</button>
            <div id="foodList" style="margin-top:20px;"></div>
        </div>
        
        <div class="section">
            <div class="sec-title"><i class="fa-solid fa-wine-glass"></i> အအေး (Drink Options)</div>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:8px; margin-bottom:10px;">
                <input type="text" id="drinkName" class="form-control" placeholder="အမည်" style="margin-bottom:0;">
                <input type="number" id="drinkPrice" class="form-control" placeholder="စျေး" style="margin-bottom:0;">
            </div>
            <button class="btn btn-primary btn-sm" style="width:100%;" onclick="window.saveMenu('drink')">+ အအေးအသစ် ထည့်မည်</button>
            <div id="drinkList" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<div class="modal" id="logModal"><div class="modal-content"><button class="btn btn-sm btn-outline" style="position:absolute; top:15px; right:15px;" onclick="window.closeModal('logModal')">X</button><h3 style="margin-bottom:15px;">ဂိုဒေါင် မှတ်တမ်း</h3><div id="logBody"></div></div></div>
<div class="modal" id="manageModal"><div class="modal-content"><button class="btn btn-sm btn-outline" style="position:absolute; top:15px; right:15px;" onclick="window.closeModal('manageModal')">X</button><h3 style="margin-bottom:15px;">Code များ ပြင်ဆင်ရန်</h3><select id="pSelect" class="form-control" onchange="window.renderManage()"></select><div id="manageBody"></div></div></div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="window.switchTab('home',this)"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" onclick="window.switchTab('users',this)"><i class="fa-solid fa-users"></i><span>Users</span></div>
    <div class="nav-item" onclick="window.switchTab('orders',this)"><i class="fa-solid fa-bell-concierge"></i><span>Orders</span></div>
    <div class="nav-item" onclick="window.switchTab('food',this)"><i class="fa-solid fa-gear"></i><span>Menu</span></div>
</nav>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const fc = { apiKey: "AIzaSyCWtLbUKGHG6ZHXzU69YLwNvH2Z5EWOyV4", authDomain: "wifipay-ff292.firebaseapp.com", projectId: "wifipay-ff292", storageBucket: "wifipay-ff292.firebasestorage.app", messagingSenderId: "429630230761", appId: "1:429630230761:web:8c7f29457326c1f0c02078", databaseURL: "https://wifipay-ff292-default-rtdb.asia-southeast1.firebasedatabase.app/" };
const app = initializeApp(fc); const db = getDatabase(app);

let data = { customers:{}, inventory:{}, food_menu:{}, drink_options:{}, food_orders:{}, inventoryLog:[] };
let isInitialLoad = true; let prevPendingCount = 0;

window.showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
window.switchTab = (tab, el) => {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active'); el.classList.add('active');
};
window.closeModal = (id) => document.getElementById(id).style.display = 'none';

// === MAIN DATA LISTENER ===
onValue(ref(db, '/'), snap => {
    if(snap.exists()){
        data = snap.val();
        renderDash(); renderStock(); renderCusList(); renderMenuAdmin();
        
        let orders = data.food_orders ? Object.values(data.food_orders) : [];
        let pending = orders.filter(o => o.status === 'pending');
        if(!isInitialLoad && pending.length > prevPendingCount) {
            document.getElementById('orderRing').play().catch(e=>{});
            alert("🔔 အော်ဒါအသစ် ဝင်လာပါပြီ!");
        }
        prevPendingCount = pending.length; isInitialLoad = false;
        renderOrders(orders);
    }
});

// === DASHBOARD ===
function renderDash(){
    document.getElementById('statUsers').innerText = Object.keys(data.customers||{}).length;
    let invCount = 0; Object.values(data.inventory||{}).forEach(a => invCount += a.length);
    document.getElementById('statVoucher').innerText = invCount;
    let topup=0, food=0;
    Object.values(data.customers||{}).forEach(c => {
        if(c.history) Object.values(c.history).forEach(h => {
            if(h.type==='topup_in') topup += h.amount;
            if(h.type==='food') food += h.amount;
        });
    });
    document.getElementById('statTopup').innerText = topup.toLocaleString();
    document.getElementById('statFood').innerText = food.toLocaleString();
    
    // Update Datalist for Search
    const list = document.getElementById('pList'); list.innerHTML = '';
    Object.values(data.customers||{}).forEach(c => { list.innerHTML += `<option value="${c.phone}">${c.name}</option>`; });
}

// === 1. STOCK SYSTEM (Duplicate Check & Logs) ===
window.addStock = async () => {
    const text = document.getElementById('newCodes').value; if(!text.trim()) return;
    const lines = text.split('\n');
    let inv = data.inventory || { "1 Hour":[], "4 Hours":[], "1 Day":[], "1 Week":[], "1 Month":[] };
    let existing = new Set();
    Object.values(inv).forEach(arr => arr.forEach(i => existing.add(i.code)));
    
    let added = { "1 Hour":0, "4 Hours":0, "1 Day":0, "1 Week":0, "1 Month":0 };
    let dupCount = 0;

    lines.forEach(line => {
        let cols = line.trim().split(/\s+/);
        if(cols.length >= 2){
            const code = cols[0]; const pRaw = cols[1].toLowerCase();
            let p = "";
            if(pRaw.includes('1hour')) p="1 Hour"; else if(pRaw.includes('4hour')) p="4 Hours";
            else if(pRaw.includes('1day')) p="1 Day"; else if(pRaw.includes('1week')) p="1 Week";
            else if(pRaw.includes('1month')) p="1 Month";
            
            if(p) {
                if(!existing.has(code)) { inv[p].push({code, price:0}); existing.add(code); added[p]++; }
                else { dupCount++; }
            }
        }
    });
    
    let logDetail = Object.entries(added).filter(a=>a[1]>0).map(a=>`${a[0]}: ${a[1]}`).join(', ');
    if(logDetail) {
        let logs = data.inventoryLog ? Object.values(data.inventoryLog) : [];
        logs.unshift({ date: new Date().toLocaleString(), detail: logDetail });
        await update(ref(db), { inventory: inv, inventoryLog: logs });
        document.getElementById('newCodes').value = '';
        window.showToast("ဂိုဒေါင်ထဲ သိမ်းဆည်းပြီးပါပြီ!");
    } else if (dupCount > 0) {
        alert("အသစ်မဝင်ပါ။ ထည့်ထားသော Code များသည် ရှိပြီးသား (သို့) ရောင်းပြီးသားများ ဖြစ်နေပါသည်။");
    }
};

function renderStock(){
    const cont = document.getElementById('stockSummary'); cont.innerHTML = '';
    ["1 Hour", "4 Hours", "1 Day", "1 Week", "1 Month"].forEach(p => {
        let c = (data.inventory && data.inventory[p]) ? data.inventory[p].length : 0;
        cont.innerHTML += `<div class="stock-item"><span>${p}</span> <b>${c} ခု</b></div>`;
    });
}

window.openModal = (id) => {
    document.getElementById(id).style.display = 'flex';
    if(id==='logModal'){
        const lb = document.getElementById('logBody'); lb.innerHTML = '';
        let logs = data.inventoryLog ? Object.values(data.inventoryLog) : [];
        if(logs.length === 0) lb.innerHTML = '<p style="color:var(--text-sub); font-size:12px;">မှတ်တမ်း မရှိသေးပါ</p>';
        logs.forEach(l => { lb.innerHTML += `<div style="padding:12px; border-bottom:1px solid var(--border); font-size:12px;"><b style="color:var(--gold);">${l.date}</b><br>${l.detail}</div>`; });
    }
};

window.openManageStock = () => {
    const sel = document.getElementById('pSelect'); sel.innerHTML = '';
    ["1 Hour", "4 Hours", "1 Day", "1 Week", "1 Month"].forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
    window.openModal('manageModal'); window.renderManage();
};
window.renderManage = () => {
    const p = document.getElementById('pSelect').value; const mb = document.getElementById('manageBody'); mb.innerHTML = '';
    let items = data.inventory ? data.inventory[p] : [];
    if(!items || items.length === 0) mb.innerHTML = '<p style="color:var(--text-sub); font-size:12px;">Code များ မရှိပါ</p>';
    (items || []).forEach((item, i) => {
        mb.innerHTML += `<div class="item-card"><span>${item.code}</span><button class="btn btn-sm btn-danger" onclick="window.delCode('${p}',${i})">X</button></div>`;
    });
};
window.delCode = async (p, i) => { let inv = data.inventory[p]; inv.splice(i, 1); await set(ref(db, `inventory/${p}`), inv); window.renderManage(); };

// === 2. TOPUP & SEARCH ===
window.checkCus = () => {
    const ph = document.getElementById('topupPhone').value.trim();
    if(!ph) return window.showToast("ဖုန်းနံပါတ် သို့မဟုတ် အမည် ထည့်ပါ");
    const cus = Object.values(data.customers||{}).find(c => c.phone===ph || c.name===ph);
    if(cus){
        document.getElementById('infoName').innerText = cus.name;
        document.getElementById('infoBal').innerText = (cus.balance||0).toLocaleString();
        document.getElementById('cusInfoBox').style.display = 'block';
    } else { alert("❌ ရှာမတွေ့ပါ! အကောင့် ဖွင့်ထားသူ မဟုတ်ပါ။"); document.getElementById('cusInfoBox').style.display = 'none'; }
};

window.doTopup = async (type) => {
    const ph = document.getElementById('topupPhone').value.trim();
    const cus = Object.values(data.customers||{}).find(c => c.phone===ph || c.name===ph);
    const amt = parseInt(document.getElementById('topupAmt').value);
    if(!cus || !amt) return window.showToast("ပမာဏ ထည့်ပါ");
    
    if(type==='out' && (cus.balance||0) < amt) return window.showToast("လက်ကျန်ငွေ မလောက်ပါ");

    let newBal = (type==='in') ? (cus.balance||0)+amt : (cus.balance||0)-amt;
    let u = {}; let now = new Date().toLocaleString();
    u[`customers/${cus.phone}/balance`] = newBal;
    u[`customers/${cus.phone}/history/tx_${Date.now()}`] = { type: type==='in'?'topup_in':'deduct_out', title: type==='in'?'Admin Topup':'Admin Deduct', amount: amt, date: now };
    await update(ref(db), u);
    window.showToast("အောင်မြင်ပါသည်!");
    document.getElementById('cusInfoBox').style.display='none'; document.getElementById('topupPhone').value=''; document.getElementById('topupAmt').value='';
};

// === 5. USERS LIST ===
function renderCusList(){
    const cont = document.getElementById('userList'); cont.innerHTML = '';
    const list = Object.values(data.customers||{}).sort((a,b)=>(b.balance||0)-(a.balance||0));
    list.forEach(c => {
        cont.innerHTML += `<div class="item-card"><div><b>${c.name}</b><br><span style="font-size:11px; color:var(--text-sub);">${c.phone}</span></div><b style="color:var(--green); font-size:16px;">${(c.balance||0).toLocaleString()} Ks</b></div>`;
    });
}

// === 6. FOOD ORDERS & REFUND LOGIC ===
function renderOrders(orders){
    const cont = document.getElementById('orderList'); cont.innerHTML = '';
    let activeOrders = orders.filter(o => o.status !== 'completed' && o.status !== 'cancelled').sort((a,b) => new Date(a.date) - new Date(b.date));
    
    if(!activeOrders.length) { cont.innerHTML = '<p style="text-align:center; color:var(--text-sub); font-size:12px;">အော်ဒါ အသစ်မရှိသေးပါ</p>'; return; }
    
    activeOrders.forEach(o => {
        let itemsText = o.items ? o.items.map(i=>`${i.qty}x ${i.name}`).join(', ') : '';
        let payType = o.payment_method === 'cash' ? '💵 Cash (ဆိုင်ရှင်း)' : '💳 Wallet (ငွေဖြတ်ပြီး)';
        
        cont.innerHTML += `<div class="order-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <b>${o.name}</b> <span class="status-badge ${o.status==='pending'?'st-pending':'st-accepted'}">${o.status}</span>
            </div>
            <div style="font-size:12px; color:var(--text-sub); margin-bottom:8px;">${itemsText}</div>
            <div style="font-size:11px; color:var(--text); margin-bottom:5px;">${payType}</div>
            <div style="font-size:11px; color:var(--primary); margin-bottom:12px;"><i class="fa-solid fa-location-dot"></i> ${o.address}</div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color:var(--green);">${(o.total||0).toLocaleString()} Ks</b>
                <div style="display:flex; gap:5px;">
                    ${o.status==='pending' ? `<button class="btn btn-sm btn-green" onclick="window.updOrder('${o.id}','accepted')">လက်ခံမည်</button>` : ''}
                    <button class="btn btn-sm btn-primary" onclick="window.updOrder('${o.id}','completed')">Done</button>
                    <button class="btn btn-sm btn-danger" onclick="window.cancelOrder('${o.id}', '${o.phone}', ${o.total}, '${o.payment_method}')">X Cancel</button>
                </div>
            </div>
        </div>`;
    });
}

window.updOrder = async (id, status) => { 
    await update(ref(db, `food_orders/${id}`), { status }); 
    window.showToast("အော်ဒါ အခြေအနေ ပြောင်းလဲပြီး"); 
};

window.cancelOrder = async (orderId, phone, amount, payMethod) => {
    if(!confirm("ဤအော်ဒါကို ပယ်ဖျက်မှာ သေချာပြီလား?\n(Wallet ဖြင့် ရှင်းထားပါက ငွေပြန်အမ်းပေးပါမည်)")) return;
    
    let updates = {};
    updates[`food_orders/${orderId}/status`] = 'cancelled';
    
    // REFUND LOGIC (ငွေပြန်အမ်းခြင်း)
    if(payMethod !== 'cash') {
        const cSnap = await get(ref(db, `customers/${phone}`));
        if(cSnap.exists()) {
            let cus = cSnap.val();
            let newBal = (cus.balance || 0) + amount;
            updates[`customers/${phone}/balance`] = newBal;
            updates[`customers/${phone}/history/tx_refund_${Date.now()}`] = {
                type: 'tx_in', title: 'Refund: Cancelled Order', amount: amount, date: new Date().toLocaleString()
            };
        }
    }
    
    await update(ref(db), updates);
    window.showToast("အော်ဒါ ပယ်ဖျက်ပြီး ငွေပြန်အမ်းပေးပါပြီ!");
};

// === 7. MENU ADMIN (Icons & Lists) ===
window.saveMenu = async (type) => {
    let id = type==='food' ? 'f_'+Date.now() : 'd_'+Date.now();
    let name = document.getElementById(type==='food'?'foodName':'drinkName').value;
    let price = parseInt(document.getElementById(type==='food'?'foodPrice':'drinkPrice').value);
    
    if(!name || !price) return window.showToast("အချက်အလက် ပြည့်စုံစွာ ထည့်ပါ");
    
    if(type==='food') {
        let icon = document.getElementById('foodIcon').value || '🍲';
        await set(ref(db, `food_menu/${id}`), { id, name, price, icon });
        document.getElementById('foodIcon').value=''; document.getElementById('foodName').value=''; document.getElementById('foodPrice').value='';
    } else {
        await set(ref(db, `drink_options/${id}`), { id, name, price });
        document.getElementById('drinkName').value=''; document.getElementById('drinkPrice').value='';
    }
    window.showToast("Menu သို့ သိမ်းဆည်းပြီးပါပြီ");
};

function renderMenuAdmin(){
    const fl = document.getElementById('foodList'); fl.innerHTML = '<p style="font-size:11px; color:var(--text-sub); margin-bottom:10px;">လက်ရှိ ဟင်းပွဲများ:</p>';
    Object.values(data.food_menu||{}).forEach(f => {
        if(f.isOptions) return;
        fl.innerHTML += `<div class="item-card"><span>${f.icon} <b>${f.name}</b> (${f.price} Ks)</span><button class="btn btn-sm btn-danger" onclick="window.delMenu('food_menu','${f.id}')">ဖျက်မည်</button></div>`;
    });
    
    const dl = document.getElementById('drinkList'); dl.innerHTML = '<p style="font-size:11px; color:var(--text-sub); margin-bottom:10px;">လက်ရှိ အအေးများ:</p>';
    Object.values(data.drink_options||{}).forEach(d => {
        dl.innerHTML += `<div class="item-card"><span>🥤 <b>${d.name}</b> (${d.price} Ks)</span><button class="btn btn-sm btn-danger" onclick="window.delMenu('drink_options','${d.id}')">ဖျက်မည်</button></div>`;
    });
}

window.delMenu = async (path, id) => {
    if(confirm("ဤ Menu ကို ဖျက်မှာ သေချာပြီလား?")) await remove(ref(db, `${path}/${id}`));
};
</script>
